<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAT & Defect Tracking | EmpowerMe Wellness</title>
<style>
:root {
  --bg-primary: #1B2A4A;
  --bg-secondary: #162240;
  --bg-card: #213358;
  --bg-card-hover: #2A3F6A;
  --border: #2E4470;
  --text-primary: #FFFFFF;
  --text-secondary: #B0BEC5;
  --text-muted: #7A8FA8;
  --accent-blue: #00838F;
  --accent-teal: #4DB6AC;
  --accent-orange: #E8735A;
  --accent-red: #EF5350;
  --accent-green: #66BB6A;
  --accent-amber: #FFA726;
  --accent-purple: #AB47BC;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Arial','Helvetica Neue',sans-serif; background:var(--bg-primary); color:var(--text-primary); line-height:1.6; overflow-x:hidden; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg-secondary); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* HEADER */
.header {
  position:sticky; top:0; z-index:100;
  background:rgba(11,15,26,0.92); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 24px; display:flex; align-items:center; justify-content:space-between;
}
.header-left { display:flex; align-items:center; gap:14px; }
.logo-mark {
  width:38px; height:38px; background:linear-gradient(135deg,#00838F,#4DB6AC);
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-family:'Consolas','Courier New',monospace; font-weight:700; font-size:14px; color:var(--bg-primary);
}
.header-title { font-size:16px; font-weight:700; }
.header-subtitle { font-size:10px; color:var(--text-secondary); font-family:'Consolas','Courier New',monospace; text-transform:uppercase; letter-spacing:1px; }
.header-right { display:flex; align-items:center; gap:10px; }
.role-select {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:6px 10px; color:var(--text-primary); font-size:11px; cursor:pointer; font-family:inherit;
}
.role-select option { background:var(--bg-secondary); }
.search-box {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:6px 12px; color:var(--text-primary); font-size:12px; width:180px; font-family:inherit;
}
.search-box:focus { outline:none; border-color:var(--accent-blue); }
.search-box::placeholder { color:var(--text-muted); }

/* HERO METRICS */
.hero-metrics { padding:20px 24px 12px; display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
.metric-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px; position:relative; overflow:hidden; transition:all 0.3s; cursor:default;
}
.metric-card:hover { border-color:var(--accent-blue); transform:translateY(-2px); }
.metric-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.metric-label { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--text-secondary); font-family:'Consolas','Courier New',monospace; margin-bottom:4px; }
.metric-value { font-size:28px; font-weight:700; letter-spacing:-1px; line-height:1; }
.metric-sub { font-size:10px; color:var(--text-muted); margin-top:3px; }

/* MAIN LAYOUT */
.main-layout { display:flex; min-height:calc(100vh - 160px); }
.sidebar {
  width:240px; min-width:240px; border-right:1px solid var(--border);
  padding:12px 0; background:var(--bg-secondary); overflow-y:auto; max-height:calc(100vh - 160px); position:sticky; top:60px;
}
.sidebar-label { padding:6px 16px; font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); font-family:'Consolas','Courier New',monospace; margin-top:8px; }
.nav-item {
  padding:8px 16px; cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:all 0.2s; border-left:3px solid transparent; font-size:12px; color:var(--text-secondary);
}
.nav-item:hover { background:rgba(0,131,143,0.08); color:var(--text-primary); }
.nav-item.active { background:rgba(0,131,143,0.12); border-left-color:var(--accent-blue); color:var(--text-primary); font-weight:600; }
.nav-icon { font-size:13px; width:20px; text-align:center; }
.nav-badge {
  margin-left:auto; font-size:9px; font-family:'Consolas','Courier New',monospace; font-weight:700;
  padding:2px 6px; border-radius:10px;
}
.nav-badge.red { background:rgba(239,83,80,0.15); color:var(--accent-red); }
.nav-badge.amber { background:rgba(255,167,38,0.15); color:var(--accent-amber); }
.nav-badge.purple { background:rgba(171,71,188,0.15); color:var(--accent-purple); }
.nav-badge.teal { background:rgba(77,182,172,0.15); color:var(--accent-teal); }
.nav-badge.blue { background:rgba(0,131,143,0.15); color:var(--accent-blue); }

/* CONTENT */
.content { flex:1; padding:16px 24px; overflow-y:auto; max-height:calc(100vh - 160px); }
.content-header { margin-bottom:16px; }
.content-title { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.content-meta { font-size:11px; color:var(--text-secondary); margin-top:2px; }

/* FILTERS */
.filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.filter-select {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:5px 10px; color:var(--text-primary); font-size:11px; cursor:pointer; font-family:inherit;
}
.filter-select option { background:var(--bg-secondary); }

/* TABLE */
.table-container { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.data-table { width:100%; border-collapse:collapse; font-size:11px; }
.data-table th {
  background:var(--bg-secondary); padding:8px 10px; text-align:left;
  font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);
  font-family:'Consolas','Courier New',monospace; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2;
}
.data-table td { padding:7px 10px; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--text-secondary); vertical-align:middle; }
.data-table tr { cursor:pointer; transition:background 0.15s; }
.data-table tbody tr:hover td { background:rgba(0,131,143,0.06); }

/* STATUS BADGES */
.status-badge {
  display:inline-block; padding:2px 8px; border-radius:4px; font-size:9px;
  font-family:'Consolas','Courier New',monospace; font-weight:700; text-transform:uppercase; white-space:nowrap;
}
.status-badge.not-started { background:rgba(255,255,255,0.06); color:var(--text-muted); }
.status-badge.in-progress { background:rgba(0,131,143,0.2); color:var(--accent-blue); }
.status-badge.pass { background:rgba(102,187,106,0.2); color:var(--accent-green); }
.status-badge.fail { background:rgba(239,83,80,0.2); color:var(--accent-red); }
.status-badge.blocked { background:rgba(255,167,38,0.2); color:var(--accent-amber); }
.status-badge.retest { background:rgba(0,131,143,0.2); color:var(--accent-teal); }
.status-badge.pending-approval { background:rgba(171,71,188,0.2); color:var(--accent-purple); }
.status-badge.closed { background:rgba(102,187,106,0.15); color:var(--accent-green); }
.status-badge.rejected { background:rgba(232,115,90,0.2); color:var(--accent-orange); }

.priority-badge {
  display:inline-block; padding:1px 6px; border-radius:3px; font-size:9px;
  font-family:'Consolas','Courier New',monospace; font-weight:700;
}
.priority-badge.P0 { background:rgba(239,83,80,0.2); color:var(--accent-red); }
.priority-badge.P1 { background:rgba(255,167,38,0.2); color:var(--accent-amber); }
.priority-badge.P2 { background:rgba(0,131,143,0.2); color:var(--accent-blue); }

.severity-badge {
  display:inline-block; padding:1px 6px; border-radius:3px; font-size:9px;
  font-family:'Consolas','Courier New',monospace; font-weight:700;
}
.severity-badge.Critical { background:rgba(239,83,80,0.25); color:var(--accent-red); }
.severity-badge.High { background:rgba(232,115,90,0.2); color:var(--accent-orange); }
.severity-badge.Medium { background:rgba(255,167,38,0.2); color:var(--accent-amber); }
.severity-badge.Low { background:rgba(0,131,143,0.2); color:var(--accent-blue); }

/* DETAIL PANEL */
.overlay {
  position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5);
  z-index:150; opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.overlay.visible { opacity:1; pointer-events:all; }
.detail-panel {
  position:fixed; top:0; right:0; width:520px; height:100vh;
  background:var(--bg-secondary); border-left:1px solid var(--border);
  box-shadow:-8px 0 40px rgba(0,0,0,0.5); z-index:200;
  transform:translateX(100%); transition:transform 0.3s ease; overflow-y:auto; padding:20px;
}
.detail-panel.open { transform:translateX(0); }
.detail-close {
  position:absolute; top:14px; right:14px; width:30px; height:30px;
  border:1px solid var(--border); border-radius:8px; background:var(--bg-card);
  color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px;
}
.detail-close:hover { border-color:var(--accent-orange); color:var(--accent-orange); }
.detail-title { font-size:16px; font-weight:700; padding-right:40px; margin-bottom:4px; }
.detail-subtitle { font-size:10px; font-family:'Consolas','Courier New',monospace; color:var(--accent-teal); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }
.detail-section { margin-bottom:16px; }
.detail-section-title {
  font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);
  font-family:'Consolas','Courier New',monospace; margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid var(--border);
}
.detail-field { margin-bottom:8px; font-size:12px; color:var(--text-secondary); line-height:1.5; }
.detail-field strong { color:var(--text-primary); font-size:11px; display:block; margin-bottom:2px; }
.detail-card {
  background:var(--bg-card); border-radius:var(--radius-sm); padding:10px 12px;
  margin-bottom:6px; border-left:3px solid var(--border); font-size:11px; line-height:1.5; color:var(--text-secondary);
}

/* ACTION BUTTONS */
.btn {
  padding:6px 14px; border:none; border-radius:var(--radius-sm); font-size:11px;
  font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit;
}
.btn-primary { background:var(--accent-blue); color:white; }
.btn-primary:hover { background:#009BA6; }
.btn-danger { background:var(--accent-red); color:white; }
.btn-danger:hover { background:#E53935; }
.btn-success { background:var(--accent-green); color:white; }
.btn-success:hover { background:#57A85E; }
.btn-warn { background:var(--accent-amber); color:var(--bg-primary); }
.btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-secondary); }
.btn-ghost:hover { border-color:var(--accent-blue); color:var(--text-primary); }
.btn-sm { padding:4px 10px; font-size:10px; }

.action-row { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }

/* MODAL */
.modal-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6);
  z-index:300; display:none; align-items:center; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:24px; width:420px; max-width:90vw; max-height:80vh; overflow-y:auto;
}
.modal h3 { font-size:16px; margin-bottom:12px; }
.modal label { display:block; font-size:11px; color:var(--text-secondary); margin-bottom:4px; margin-top:10px; }
.modal input, .modal select, .modal textarea {
  width:100%; background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:7px 10px; color:var(--text-primary); font-size:12px; font-family:inherit;
}
.modal textarea { min-height:60px; resize:vertical; }
.modal input:focus, .modal select:focus, .modal textarea:focus { outline:none; border-color:var(--accent-blue); }

/* APPROVAL QUEUE CARD */
.approval-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px; margin-bottom:10px; transition:all 0.2s;
}
.approval-card:hover { border-color:var(--accent-purple); }
.approval-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.approval-card-title { font-size:13px; font-weight:700; }
.approval-card-meta { font-size:10px; color:var(--text-muted); font-family:'Consolas','Courier New',monospace; }
.approval-card-body { font-size:11px; color:var(--text-secondary); margin-bottom:10px; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty-state .icon { font-size:36px; margin-bottom:12px; }
.empty-state .msg { font-size:14px; }

/* TOAST */
.toast {
  position:fixed; bottom:24px; right:24px; background:var(--bg-card); border:1px solid var(--accent-green);
  border-radius:var(--radius-sm); padding:10px 18px; color:var(--accent-green); font-size:12px;
  z-index:400; transform:translateY(100px); opacity:0; transition:all 0.3s;
}
.toast.show { transform:translateY(0); opacity:1; }

@media (max-width:1200px) { .hero-metrics { grid-template-columns:repeat(3,1fr); } }
@media (max-width:900px) { .hero-metrics { grid-template-columns:repeat(2,1fr); } .sidebar { display:none; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-mark">UT</div>
    <div>
      <div class="header-title">UAT & Defect Tracking</div>
      <div class="header-subtitle">EmpowerMe Wellness &middot; Consent Workflow & RCM</div>
    </div>
  </div>
  <div class="header-right">
    <input type="text" class="search-box" placeholder="Search test cases..." id="globalSearch" oninput="applyFilters()">

      <option value="tester">Tester / SME</option>

      <option value="stakeholder">Stakeholder (Teresa / Julia)</option>

<div class="hero-metrics" id="heroMetrics"></div>

<div class="main-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="mainContent"></main>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">&times;</button>
  <div id="detailContent"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

// ============================================================
// METRICS
// ============================================================
function getMetrics() {
  const total = TEST_CASES.length;
  const passed = TEST_CASES.filter(t=>t.status==='Pass').length;
  const failed = TEST_CASES.filter(t=>t.status==='Fail').length;
  const blocked = TEST_CASES.filter(t=>t.status==='Blocked').length;
  const pendingApproval = TEST_CASES.filter(t=>t.status==='Pending Approval').length;
  const openDefects = allDefects.filter(d=>d.status!=='Closed').length;
  const closedDefects = allDefects.filter(d=>d.status==='Closed');
  let avgRes = 0;
  if(closedDefects.length > 0) {
    const totalDays = closedDefects.reduce((s,d)=> s + (d.resolutionDays||2), 0);
    avgRes = (totalDays / closedDefects.length).toFixed(1);
  }
  return {total, passed, failed: failed + openDefects, blocked, pendingApproval, avgRes: avgRes||'—'};
}

function renderMetrics() {
  const m = getMetrics();
  document.getElementById('heroMetrics').innerHTML = `
    <div class="metric-card" style="--c:#00838F"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:#00838F"></div>
      <div class="metric-label">Total Test Cases</div><div class="metric-value">${m.total}</div><div class="metric-sub">47 requirements traced</div></div>

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar() {
  const openByFlow = {};
  FLOWS.forEach(f => { openByFlow[f] = TEST_CASES.filter(t=>t.flow===f && (t.status==='Fail'||t.status==='Blocked')).length; });
  const openDefects = allDefects.filter(d=>d.status!=='Closed').length;
  const pendingApproval = TEST_CASES.filter(t=>t.status==='Pending Approval').length;
  const retestCount = TEST_CASES.filter(t=>t.status==='Retest').length;

  let html = `<div class="sidebar-label">Views</div>`;
  const views = [
    {id:'dashboard',icon:'📊',label:'Dashboard Overview'},
    {id:'defects',icon:'🐛',label:'Open Defects Worklist',badge:openDefects,badgeClass:'red'},
    {id:'assignments',icon:'👤',label:'My Assignments'},
    {id:'retest',icon:'🔄',label:'Retest Queue',badge:retestCount,badgeClass:'teal'},
    {id:'approval',icon:'✅',label:'Pending Approval',badge:pendingApproval,badgeClass:'purple'},
  ];
  views.forEach(v => {
    const active = currentView===v.id && !currentFlow ? 'active' : '';
    const badge = v.badge ? `<span class="nav-badge ${v.badgeClass}">${v.badge}</span>` : '';
    html += `<div class="nav-item ${active}" onclick="setView('${v.id}')""><span class="nav-icon">${v.icon}</span>${v.label}${badge}</div>`;
  });

  html += `<div class="sidebar-label" style="margin-top:16px">Process Flows</div>`;
  FLOWS.forEach(f => {
    const active = currentFlow===f ? 'active' : '';
    const count = openByFlow[f];
    const badge = count > 0 ? `<span class="nav-badge red">${count}</span>` : '';
    html += `<div class="nav-item ${active}" onclick="setFlow('${f}')"><span class="nav-icon">${FLOW_ICONS[f]}</span>${f}${badge}</div>`;
  });

  document.getElementById('sidebar').innerHTML = html;
}

// ============================================================
// NAVIGATION
// ============================================================
function setView(view) {
  currentView = view; currentFlow = null;
  renderSidebar(); renderContent();
}
function setFlow(flow) {
  currentFlow = flow; currentView = 'flow';
  renderSidebar(); renderContent();
}
function switchRole() {
  currentRole = document.getElementById('roleSelect').value;
  renderContent();
}

// ============================================================
// CONTENT RENDERING
// ============================================================
function renderContent() {
  const el = document.getElementById('mainContent');
  if(currentFlow) return renderFlowView(el, currentFlow);
  switch(currentView) {
    case 'dashboard': return renderDashboard(el);
    case 'defects': return renderDefectsView(el);
    case 'assignments': return renderAssignmentsView(el);
    case 'retest': return renderRetestView(el);
    case 'approval': return renderApprovalView(el);
    default: return renderDashboard(el);
  }
}

function renderDashboard(el) {
  const flowCards = FLOWS.map(f => {
    const cases = TEST_CASES.filter(t=>t.flow===f);
    const passed = cases.filter(t=>t.status==='Pass').length;
    const failed = cases.filter(t=>t.status==='Fail').length;
    const blocked = cases.filter(t=>t.status==='Blocked').length;
    const notStarted = cases.filter(t=>t.status==='Not Started').length;
    const pct = cases.length ? ((passed/cases.length)*100).toFixed(0) : 0;
    const barW = cases.length ? (passed/cases.length*100) : 0;
    const barF = cases.length ? (failed/cases.length*100) : 0;
    const barB = cases.length ? (blocked/cases.length*100) : 0;
    return `<div class="approval-card" onclick="setFlow('${f}')" style="cursor:pointer">
      <div class="approval-card-header">
        <div class="approval-card-title">${FLOW_ICONS[f]} ${f}</div>
        <span class="approval-card-meta">${cases.length} cases</span>
      </div>
      <div style="display:flex;gap:14px;margin-bottom:8px">
        <div style="font-size:10px;color:var(--text-muted);font-family:'Consolas',monospace"><strong style="display:block;font-size:16px;color:var(--accent-green)">${passed}</strong>Passed</div>
        <div style="font-size:10px;color:var(--text-muted);font-family:'Consolas',monospace"><strong style="display:block;font-size:16px;color:var(--accent-red)">${failed}</strong>Failed</div>
        <div style="font-size:10px;color:var(--text-muted);font-family:'Consolas',monospace"><strong style="display:block;font-size:16px;color:var(--accent-amber)">${blocked}</strong>Blocked</div>
        <div style="font-size:10px;color:var(--text-muted);font-family:'Consolas',monospace"><strong style="display:block;font-size:16px;color:var(--text-muted)">${notStarted}</strong>Pending</div>
      </div>
      <div style="height:4px;background:rgba(255,255,255,0.05);border-radius:2px;display:flex;overflow:hidden">
        <div style="width:${barW}%;background:var(--accent-green);transition:width 0.5s"></div>
        <div style="width:${barF}%;background:var(--accent-red);transition:width 0.5s"></div>
        <div style="width:${barB}%;background:var(--accent-amber);transition:width 0.5s"></div>
      </div>
      <div style="text-align:right;font-size:10px;color:var(--text-muted);margin-top:4px;font-family:'Consolas',monospace">${pct}% passed</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="content-header">
      <div class="content-title">Dashboard Overview</div>
      <div class="content-meta">EmpowerMe Wellness UAT — 47 Requirements &middot; Go/No-Go: May 30, 2026 &middot; UAT Phase: May 5–23, 2026</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px">
      ${flowCards}
    </div>`;
}

function getFilteredCases(flowFilter) {
  let cases = flowFilter ? TEST_CASES.filter(t=>t.flow===flowFilter) : [...TEST_CASES];
  const search = document.getElementById('globalSearch').value.toLowerCase();
  if(search.length >= 2) {
    cases = cases.filter(t => t.id.toLowerCase().includes(search) || t.title.toLowerCase().includes(search) || t.reqId.toLowerCase().includes(search) || t.flow.toLowerCase().includes(search));
  }
  return cases;
}

function renderTestTable(cases, title, subtitle) {
  if(cases.length === 0) return `<div class="empty-state"><div class="icon">📭</div><div class="msg">No test cases match the current filters</div></div>`;

  const isReadOnly = currentRole === 'stakeholder';
  const rows = cases.map(tc => {
    const statusClass = tc.status.toLowerCase().replace(/\s+/g,'-');
    return `<tr onclick="openTestDetail('${tc.id}')">
      <td style="font-family:'Consolas',monospace;font-size:10px;color:var(--accent-teal);white-space:nowrap">${tc.id}</td>
      <td style="font-family:'Consolas',monospace;font-size:10px;white-space:nowrap">${tc.reqId}</td>
      <td style="color:var(--text-primary);font-weight:500">${tc.title}</td>
      <td><span class="priority-badge ${tc.priority}">${tc.priority}</span></td>
      <td style="font-size:10px">${tc.sme||'—'}</td>
      <td><span class="status-badge ${statusClass}">${tc.status}</span></td>
      <td style="font-size:10px">${tc.dateTested||'—'}</td>
      ${!isReadOnly ? `<td onclick="event.stopPropagation()">
        <select class="filter-select" style="padding:3px 6px;font-size:10px;width:100px" onchange="updateStatus('${tc.id}',this.value)">
          ${STATUSES.map(s=>`<option value="${s}" ${tc.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>` : ''}
    </tr>`;
  }).join('');

  return `
    <div class="content-header">
      <div class="content-title">${title}</div>
      <div class="content-meta">${subtitle}</div>
    </div>
    <div class="filters">
      <select class="filter-select" id="filterStatus" onchange="applyFilters()">
        <option value="">All Statuses</option>
        ${STATUSES.map(s=>`<option value="${s}">${s}</option>`).join('')}
      </select>
      <select class="filter-select" id="filterPriority" onchange="applyFilters()">
        <option value="">All Priorities</option>
        <option value="P0">P0</option><option value="P1">P1</option><option value="P2">P2</option>
      </select>
      <select class="filter-select" id="filterSme" onchange="applyFilters()">
        <option value="">All SMEs</option>
        ${SMES.map(s=>`<option value="${s}">${s}</option>`).join('')}
      </select>
    </div>
    <div class="table-container">
      <table class="data-table">
        <thead><tr>
          <th>Test Case</th><th>Req ID</th><th>Title</th><th>Pri</th><th>SME</th><th>Status</th><th>Tested</th>
          ${!isReadOnly ? '<th>Action</th>' : ''}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderFlowView(el, flow) {
  const cases = getFilteredCases(flow);
  el.innerHTML = renderTestTable(cases, `${FLOW_ICONS[flow]} ${flow}`, `${cases.length} test cases in this process flow`);
  applyTableFilters();
}

function renderDefectsView(el) {
  const open = allDefects.filter(d=>d.status!=='Closed');
  if(open.length === 0) {
    el.innerHTML = `<div class="content-header"><div class="content-title">🐛 Open Defects Worklist</div></div>
      <div class="empty-state"><div class="icon">✅</div><div class="msg">No open defects — all clear!</div></div>`;
    return;
  }
  const rows = open.map(d => `<tr onclick="openDefectDetail('${d.id}')">
    <td style="font-family:'Consolas',monospace;font-size:10px;color:var(--accent-orange)">${d.id}</td>
    <td style="color:var(--text-primary)">${d.description.substring(0,50)}...</td>
    <td><span class="severity-badge ${d.severity}">${d.severity}</span></td>
    <td style="font-size:10px">${d.assignedTo}</td>
    <td><span class="status-badge ${d.status.toLowerCase().replace(/\s+/g,'-')}">${d.status}</span></td>
    <td style="font-size:10px">${d.testCaseId}</td>
  </tr>`).join('');

  el.innerHTML = `<div class="content-header"><div class="content-title">🐛 Open Defects Worklist</div><div class="content-meta">${open.length} open defects requiring resolution</div></div>
    <div class="table-container"><table class="data-table">
      <thead><tr><th>Defect ID</th><th>Description</th><th>Severity</th><th>Assigned To</th><th>Status</th><th>Test Case</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function renderAssignmentsView(el) {
  const cases = TEST_CASES.filter(t=>t.sme && t.status !== 'Pass' && t.status !== 'Closed');
  el.innerHTML = renderTestTable(cases.length ? cases : TEST_CASES.filter(t=>t.status!=='Pass'), '👤 My Assignments', 'Test cases assigned and pending completion');
}

function renderRetestView(el) {
  const cases = TEST_CASES.filter(t=>t.status==='Retest');
  if(cases.length === 0) {
    el.innerHTML = `<div class="content-header"><div class="content-title">🔄 Retest Queue</div></div>
      <div class="empty-state"><div class="icon">✅</div><div class="msg">No items in retest queue</div></div>`;
    return;
  }
  el.innerHTML = renderTestTable(cases, '🔄 Retest Queue', `${cases.length} test cases awaiting retest after defect fix`);
}

function renderApprovalView(el) {
  const pending = TEST_CASES.filter(t=>t.status==='Pending Approval');
  const isLead = currentRole === 'lead';

  if(pending.length === 0) {
    el.innerHTML = `<div class="content-header"><div class="content-title">✅ Pending Lead Approval</div></div>
      <div class="empty-state"><div class="icon">📭</div><div class="msg">No items awaiting approval</div></div>`;
    return;
  }

  const cards = pending.map(tc => {
    const defects = allDefects.filter(d=>d.testCaseId===tc.id);
    return `<div class="approval-card">
      <div class="approval-card-header">
        <div class="approval-card-title">${tc.id} — ${tc.title}</div>
        <span class="status-badge pending-approval">Pending Approval</span>
      </div>
      <div class="approval-card-body">
        <strong>Flow:</strong> ${tc.flow} &middot; <strong>Priority:</strong> ${tc.priority} &middot; <strong>Defects:</strong> ${defects.length}
        ${defects.map(d=>`<div style="margin-top:4px;padding:4px 8px;background:rgba(0,0,0,0.2);border-radius:4px;font-size:10px">
          <span class="severity-badge ${d.severity}" style="margin-right:4px">${d.severity}</span> ${d.description.substring(0,60)}... — ${d.status}
        </div>`).join('')}
      </div>
      ${isLead ? `<div class="action-row">
        <button class="btn btn-success btn-sm" onclick="approveTestCase('${tc.id}')">✓ Approve</button>
        <button class="btn btn-danger btn-sm" onclick="rejectTestCase('${tc.id}')">✗ Reject</button>
      </div>` : '<div style="font-size:10px;color:var(--text-muted);font-style:italic">Switch to Test Lead role to approve/reject</div>'}
    </div>`;
  }).join('');

  el.innerHTML = `<div class="content-header">
    <div class="content-title">✅ Pending Lead Approval</div>
    <div class="content-meta">${pending.length} items awaiting Elyse / Katy sign-off</div>
  </div>${cards}`;
}

// ============================================================
// FILTERS
// ============================================================
function applyFilters() {
  renderContent();
  applyTableFilters();
}

function applyTableFilters() {
  const statusEl = document.getElementById('filterStatus');
  const prioEl = document.getElementById('filterPriority');
  const smeEl = document.getElementById('filterSme');
  if(!statusEl) return;
  const statusFilter = statusEl.value;
  const prioFilter = prioEl.value;
  const smeFilter = smeEl.value;
  const rows = document.querySelectorAll('.data-table tbody tr');
  rows.forEach(row => {
    const cells = row.querySelectorAll('td');
    if(cells.length < 6) return;
    const status = cells[5]?.textContent.trim();
    const prio = cells[3]?.textContent.trim();
    const sme = cells[4]?.textContent.trim();
    let show = true;
    if(statusFilter && status !== statusFilter) show = false;
    if(prioFilter && prio !== prioFilter) show = false;
    if(smeFilter && sme !== smeFilter) show = false;
    row.style.display = show ? '' : 'none';
  });
}

// ============================================================
// STATUS UPDATE + DEFECT AUTO-GENERATION
// ============================================================
function updateStatus(tcId, newStatus) {
  const tc = TEST_CASES.find(t=>t.id===tcId);
  if(!tc) return;
  const oldStatus = tc.status;
  tc.status = newStatus;
  tc.dateTested = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  if(newStatus === 'Fail' && oldStatus !== 'Fail') {
    showDefectModal(tcId);
  }
  renderMetrics(); renderSidebar(); renderContent();
  showToast(`${tcId} → ${newStatus}`);
}

function showDefectModal(tcId) {
  const tc = TEST_CASES.find(t=>t.id===tcId);
  document.getElementById('modalContent').innerHTML = `
    <h3 style="color:var(--accent-red)">🐛 Log Defect — ${tcId}</h3>
    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">${tc.title}</div>
    <label>Severity</label>
    <select id="defSeverity">${SEVERITIES.map(s=>`<option>${s}</option>`).join('')}</select>
    <label>Description</label>
    <textarea id="defDesc" placeholder="Describe the defect found during testing..."></textarea>
    <label>Assigned To</label>
    <select id="defAssigned">
      <option>Crosby Engineering</option>
      ${SMES.map(s=>`<option>${s}</option>`).join('')}
    </select>
    <div class="action-row" style="margin-top:14px">
      <button class="btn btn-danger" onclick="createDefect('${tcId}')">Log Defect</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('show');
}

function createDefect(tcId) {
  defectCounter++;
  const defect = {
    id: `DEF-${String(defectCounter).padStart(3,'0')}`,
    testCaseId: tcId,
    severity: document.getElementById('defSeverity').value,
    description: document.getElementById('defDesc').value || 'Defect identified during UAT execution',
    assignedTo: document.getElementById('defAssigned').value,
    status: 'Open',
    createdDate: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    resolutionNotes: '',
    retestResult: '',
    approver: '',
    approvalDate: '',
    rejectionReason: '',
    resolutionDays: 0
  };
  allDefects.push(defect);
  const tc = TEST_CASES.find(t=>t.id===tcId);
  if(tc) tc.defects.push(defect.id);
  closeModal();
  renderMetrics(); renderSidebar();
  showToast(`Defect ${defect.id} logged for ${tcId}`);
}

// ============================================================
// APPROVAL WORKFLOW
// ============================================================
function approveTestCase(tcId) {
  const tc = TEST_CASES.find(t=>t.id===tcId);
  if(!tc) return;
  tc.status = 'Closed';
  tc.defects.forEach(dId => {
    const d = allDefects.find(x=>x.id===dId);
    if(d) { d.status = 'Closed'; d.approver = 'Test Lead'; d.approvalDate = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); d.resolutionDays = Math.floor(Math.random()*3)+1; }
  });
  renderMetrics(); renderSidebar(); renderContent();
  showToast(`${tcId} APPROVED and closed`);
}

function rejectTestCase(tcId) {
  document.getElementById('modalContent').innerHTML = `
    <h3 style="color:var(--accent-orange)">✗ Reject — ${tcId}</h3>
    <label>Rejection Reason (required)</label>
    <textarea id="rejReason" placeholder="Why is this being sent back?"></textarea>
    <div class="action-row" style="margin-top:14px">
      <button class="btn btn-danger" onclick="confirmReject('${tcId}')">Reject & Reassign</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('show');
}

function confirmReject(tcId) {
  const reason = document.getElementById('rejReason').value;
  if(!reason) { alert('Rejection reason is required'); return; }
  const tc = TEST_CASES.find(t=>t.id===tcId);
  if(!tc) return;
  tc.status = 'Fail';
  tc.defects.forEach(dId => {
    const d = allDefects.find(x=>x.id===dId);
    if(d) { d.status = 'Assigned'; d.rejectionReason = reason; }
  });
  closeModal();
  renderMetrics(); renderSidebar(); renderContent();
  showToast(`${tcId} REJECTED — sent back to Assigned`);
}

// ============================================================
// DETAIL PANEL
// ============================================================
function openTestDetail(tcId) {
  const tc = TEST_CASES.find(t=>t.id===tcId);
  if(!tc) return;
  const defects = allDefects.filter(d=>d.testCaseId===tcId);
  const isReadOnly = currentRole === 'stakeholder';

  let defectHtml = '';
  if(defects.length > 0) {
    defectHtml = `<div class="detail-section">
      <div class="detail-section-title">Defect History (${defects.length})</div>
      ${defects.map(d => `<div class="detail-card" style="border-left-color:${d.severity==='Critical'?'var(--accent-red)':d.severity==='High'?'var(--accent-orange)':'var(--accent-amber)'}">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="color:var(--accent-orange);font-family:'Consolas',monospace;font-weight:700">${d.id}</span>
          <span class="severity-badge ${d.severity}">${d.severity}</span>
        </div>
        <div>${d.description}</div>
        <div style="margin-top:4px;font-size:10px;color:var(--text-muted)">Assigned: ${d.assignedTo} &middot; Status: ${d.status} &middot; ${d.createdDate}</div>
        ${d.rejectionReason ? `<div style="margin-top:4px;padding:4px 8px;background:rgba(232,115,90,0.1);border-radius:4px;font-size:10px;color:var(--accent-orange)"><strong>Rejection:</strong> ${d.rejectionReason}</div>` : ''}
        ${d.resolutionNotes ? `<div style="margin-top:4px;font-size:10px"><strong>Resolution:</strong> ${d.resolutionNotes}</div>` : ''}
        ${!isReadOnly && d.status!=='Closed' ? `<div class="action-row">
          <select class="filter-select" style="padding:3px;font-size:10px" onchange="updateDefectStatus('${d.id}',this.value)">
            <option value="Open" ${d.status==='Open'?'selected':''}>Open</option>
            <option value="Assigned" ${d.status==='Assigned'?'selected':''}>Assigned</option>
            <option value="In Progress" ${d.status==='In Progress'?'selected':''}>In Progress</option>
            <option value="Fixed" ${d.status==='Fixed'?'selected':''}>Fixed</option>
          </select>
        </div>` : ''}
      </div>`).join('')}
    </div>`;
  }

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-title">${tc.title}</div>
    <div class="detail-subtitle">${tc.id} &middot; ${tc.reqId} &middot; ${tc.flow}</div>

    <div class="detail-section">
      <div class="detail-section-title">Requirement (from BRD)</div>
      <div class="detail-field"><strong>Description</strong>${tc.description}</div>
      <div class="detail-field"><strong>System Action</strong>${tc.systemAction}</div>
      <div class="detail-field"><strong>Acceptance Criteria</strong>${tc.acceptance}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        <span class="priority-badge ${tc.priority}">${tc.priority}</span>
        <span class="status-badge ${tc.tag==='NEW'?'pass':tc.tag==='ENHANCED'?'in-progress':tc.tag==='PENDING'?'blocked':'not-started'}">${tc.tag}</span>
        <span style="font-size:9px;color:var(--text-muted);font-family:'Consolas',monospace">SRC: ${tc.source}</span>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Test Steps & Expected Results</div>
      <div class="detail-field"><strong>Type / Phase</strong>${tc.testType} &middot; ${tc.phase}</div>
      <div class="detail-field"><strong>Precondition</strong>${tc.precondition}</div>
      <div class="detail-field"><strong>Test Data</strong><pre style="white-space:pre-wrap;font-size:10px;background:rgba(0,0,0,0.2);padding:6px 8px;border-radius:4px;margin-top:2px;color:var(--text-secondary)">${tc.testData}</pre></div>
      <div class="detail-field"><strong>Steps</strong><pre style="white-space:pre-wrap;font-size:10px;background:rgba(0,0,0,0.2);padding:6px 8px;border-radius:4px;margin-top:2px;color:var(--text-secondary)">${tc.steps}</pre></div>
      <div class="detail-field"><strong>Expected Results</strong><pre style="white-space:pre-wrap;font-size:10px;background:rgba(0,0,0,0.2);padding:6px 8px;border-radius:4px;margin-top:2px;color:var(--text-secondary)">${tc.expected}</pre></div>
      <div class="detail-field"><strong>Pass/Fail Criteria</strong><pre style="white-space:pre-wrap;font-size:10px;background:rgba(0,0,0,0.2);padding:6px 8px;border-radius:4px;margin-top:2px;color:var(--text-secondary)">${tc.passFail}</pre></div>
    </div>

    ${defectHtml}

    <div class="detail-section">
      <div class="detail-section-title">Execution Status</div>
      <div class="detail-field"><strong>Status</strong><span class="status-badge ${tc.status.toLowerCase().replace(/\s+/g,'-')}">${tc.status}</span></div>
      <div class="detail-field"><strong>Tested By</strong>${tc.sme || 'Unassigned'}</div>
      <div class="detail-field"><strong>Date Tested</strong>${tc.dateTested || 'Not yet tested'}</div>
      <div class="detail-field"><strong>Notes</strong>${tc.notes}</div>
      <div class="detail-field"><strong>Data Status</strong><span style="color:${tc.dataStatus==='Defined'?'var(--accent-green)':tc.dataStatus==='Pending'?'var(--accent-amber)':'var(--accent-orange)'}">${tc.dataStatus}</span></div>
    </div>

    ${!isReadOnly ? `<div class="action-row">
      <select class="filter-select" id="detailSme" onchange="assignSme('${tc.id}',this.value)" style="min-width:120px">
        <option value="">Assign SME...</option>
        ${SMES.map(s=>`<option value="${s}" ${tc.sme===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select class="filter-select" id="detailStatus" onchange="updateStatus('${tc.id}',this.value);openTestDetail('${tc.id}')" style="min-width:120px">
        ${STATUSES.map(s=>`<option value="${s}" ${tc.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>` : ''}`;

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function openDefectDetail(defId) {
  const d = allDefects.find(x=>x.id===defId);
  if(!d) return;
  openTestDetail(d.testCaseId);
}

function assignSme(tcId, sme) {
  const tc = TEST_CASES.find(t=>t.id===tcId);
  if(tc) { tc.sme = sme; showToast(`${tcId} assigned to ${sme}`); }
}

function updateDefectStatus(defId, newStatus) {
  const d = allDefects.find(x=>x.id===defId);
  if(!d) return;
  d.status = newStatus;
  if(newStatus === 'Fixed') {
    const tc = TEST_CASES.find(t=>t.id===d.testCaseId);
    if(tc) tc.status = 'Retest';
  }
  renderMetrics(); renderSidebar();
  showToast(`${defId} → ${newStatus}`);
  // Refresh detail
  openTestDetail(d.testCaseId);
}

// ============================================================
// UTILITIES
// ============================================================
function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2500);
}

// ============================================================
// INIT
// ============================================================
renderMetrics();
renderSidebar();
renderContent();
</script>
</body>
</html>
